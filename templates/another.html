<!DOCTYPE html>
<html>
<head>
    <title>{{user.login}} profile</title>
    <style>
    .profile{
        width: 400px;
        margin: auto;
        padding: 10px;
        background-color: cornflowerblue;
        border-radius: 10px;
        font-style: normal;
    }
    body{
        background-color: #0094ff;
    }
    a{
        color:black;
        text-decoration: none;
        font-style: normal;
    }
    a:hover{
        color:dimgrey;
        text-shadow: 0px 0px 2px white;
    }
    .profile:hover{
        box-shadow: 0px 0px 5px white;
    }
    h1{
        text-shadow: 0px 0px 20px white;
    }
    h3{
        color:chartreuse
    }
    </style>
</head>
<body>
    <div class="profile">
        <h2>{{user.login}}</h2>
        <img src="{{url_for('static',filename='avatars/'+ user.image)}}", width="80">
        <h3>balance:{{user.balance}}$</h3> 
        <a href="/">-Home-</a>
    </div>
</body>
</html>
