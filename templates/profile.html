<!DOCTYPE html>
<html>
<head>
    <title>{{login}}profile</title>
    <style>
    .profile{
        width: 270px;
        margin: auto;
        padding: 10px;
        background-color: rgb(145, 145, 145);
        border-radius: 10px;
        font-style: normal;
        
    }
    body{
        background-color: #b9b9b9;
    }
    a{
        color:black;
        text-decoration: none;
        font-style: normal;
    }
    a:hover{
        color:dimgrey;
        text-shadow: 0px 0px 2px white;
    }
    .profile:hover{
        box-shadow: 0px 0px 3px white;
    }
    h1{
        text-shadow: 0px 0px 20px white;
    }
    h3{
        color:chartreuse
    }
    h2{
        color:dimgrey;
    }
    .card2Boss{
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        align-items: center;
        gap:20px
    }
    .button a{
        background: linear-gradient(to top,#006eff,#b0d2ff);
        color:white;
        border:1px solid black;
        border-radius: 10px;
        transition: 200ms;
        padding: 5px;
        font-size: 20px;
    }
    .button a:hover{
        background: linear-gradient(to top,#ff0000,#ffffff );
        box-shadow:0px 0px 1px #ff0000;
    }
    </style>
</head>
<body>
    <div class="profile">
        <h1>PROFILE</h1>
        <h2>{{name}} !</h2>
        <img src="{{url_for('static',filename='avatars/'+ image)}}", width="80">
        <br>
        <div class="button">
            <a href="/change_avatar">change</a>
        </div>
        <h3>balance:{{balance}}$</h3>
        <div class="button">
            <a href="/add_balance">-Add Balance-</a>
        </div>
        <br>
        <div class="button"> 
            <a href="/">-Home-</a>
        </div>
    </div>
</body>
</html>
